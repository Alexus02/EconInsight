[[r2_buckets]]
binding = "RESEARCH_BUCKET"
bucket_name = "econ-insight-r2"

[[d1_databases]]
binding = "DB"
database_name = "econ-insight-d1"
database_id = "60040923-eb74-4982-85bf-bfc62809d058"

[env.development]
vars = { HOST_PORTAL_TOKEN = "202202", UPLOAD_SIGNING_SECRET = "dev-signing-secret-67890", R2_PUBLIC_BASE_URL = "", BOOKING_FROM_EMAIL = "EconInsight <bookings@econinsight.com>", RESEND_API_KEY = "" }

[[env.development.r2_buckets]]
binding = "RESEARCH_BUCKET"
