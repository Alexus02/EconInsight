[[env.development.d1_databases]]
binding = "DB"
database_name = "econ-insight-d1"
database_id = "60040923-eb74-4982-85bf-bfc62809d058"

[env.production]
vars = { HOST_PORTAL_TOKEN = "", UPLOAD_SIGNING_SECRET = "", R2_PUBLIC_BASE_URL = "https://files.econinsight.com", BOOKING_FROM_EMAIL = "EconInsight <bookings@econinsight.com>", RESEND_API_KEY = "" }

[env.local]
